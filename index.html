<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SoundLeads Pro - 刘总工厂获客引擎 (满血版)</title>
    <style>
        :root { --primary: #1a73e8; --dark: #1e293b; --success: #10b981; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        /* 侧边栏 */
        .sidebar { width: 260px; background: var(--dark); color: #fff; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: bold; color: #60a5fa; margin-bottom: 5px; }
        .status { font-size: 11px; color: var(--success); margin-bottom: 20px; }
        .nav-info { font-size: 12px; color: #94a3b8; line-height: 1.8; border-top: 1px solid #334155; padding-top: 15px; }

        /* 主体 */
        .main { flex: 1; display: flex; flex-direction: column; }
        .top-bar { background: #fff; padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; padding: 10px 20px; border-radius: 20px; border: 1px solid var(--border); outline: none; }
        .btn-search { background: var(--primary); color: #fff; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .content { flex: 1; display: grid; grid-template-columns: 1fr 450px; overflow: hidden; }
        
        /* 列表区 */
        #results-list { padding: 20px; overflow-y: auto; background: #f1f5f9; }
        .lead-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; cursor: pointer; position: relative; }
        .lead-card.active { border-left: 6px solid var(--primary); background: #f0f7ff; }
        .card-title { color: var(--primary); font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        
        /* 工具按钮组 */
        .tool-bar { display: flex; gap: 8px; margin-top: 10px; }
        .tool-btn { font-size: 11px; padding: 4px 10px; border-radius: 4px; text-decoration: none; border: 1px solid #cbd5e1; background: #fff; color: #64748b; }
        .tool-btn:hover { background: #f8fafc; border-color: var(--primary); color: var(--primary); }

        /* 详情区 */
        .detail-panel { background: #fff; border-left: 1px solid var(--border); padding: 20px; overflow-y: auto; }
        .btn-save { width: 100%; background: var(--success); color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; font-size: 15px; }
        
        .section-title { font-size: 14px; font-weight: bold; margin: 15px 0 8px; display: flex; align-items: center; gap: 5px; }
        .info-box { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 13px; color: #475569; line-height: 1.5; }
        
        .email-item { color: #166534; font-weight: 500; margin-bottom: 4px; }
        
        /* 开发信区域 */
        .mail-temp { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; font-size: 12px; white-space: pre-wrap; position: relative; }
        .copy-tag { position: absolute; top: 5px; right: 5px; font-size: 10px; background: var(--primary); color: #fff; padding: 2px 6px; border-radius: 3px; cursor: pointer; }

        #loader { display: none; text-align: center; padding: 20px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🎯 SoundLeads Pro</div>
        <div class="status">● 云端增强版 | 已连接</div>
        <div class="nav-info">
            <b>获客流程：</b><br>
            1. 搜关键词<br>
            2. 查海关/找负责人<br>
            3. 一键录入线索库<br>
            4. 复制模板发邮件
        </div>
    </div>

    <div class="main">
        <div class="top-bar">
            <input type="text" id="searchInput" placeholder="例如: Speaker importer Germany">
            <button class="btn-search" onclick="executeSearch()">全网扫描</button>
        </div>
        <div id="loader">🚀 正在提取全球情报...</div>
        <div class="content">
            <div id="results-list"></div>
            <div class="detail-panel" id="intelSpace">
                <p style="text-align:center; color:#94a3b8; margin-top:100px;">选中线索开启深度挖掘</p>
            </div>
        </div>
    </div>

    <script>
        const SERPER_KEY = '13235c710dc8576425911811f046a2ab0e115639';
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxE5ThwSihLFCw0XwYLgAITA3eDQAx_5t0DMz4K1eLcY3qSidz7evptbpvGFEtdPDd_9A/exec';

        async function executeSearch() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            const list = document.getElementById('results-list');
            const loader = document.getElementById('loader');
            list.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch('https://google.serper.dev/search', {
                    method: 'POST',
                    headers: { 'X-API-KEY': SERPER_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ q: query, num: 15 })
                });
                const data = await response.json();
                renderResults(data.organic || []);
            } catch (e) { alert("搜索故障"); }
            finally { loader.style.display = 'none'; }
        }

        function renderResults(items) {
            const list = document.getElementById('results-list');
            items.forEach((item) => {
                const domain = new URL(item.link).hostname.replace('www.', '');
                const card = document.createElement('div');
                card.className = 'lead-card';
                card.onclick = () => selectLead(item, domain);
                card.innerHTML = `
                    <div class="card-title">${item.title}</div>
                    <div style="font-size:12px; color:#64748b;">${domain}</div>
                    <div class="tool-bar">
                        <a class="tool-btn" href="https://www.importyeti.com/search?q=${domain}" target="_blank" onclick="event.stopPropagation()">🚢 海关数据</a>
                        <a class="tool-btn" href="https://www.linkedin.com/search/results/people/?keywords=${domain}%20purchasing" target="_blank" onclick="event.stopPropagation()">👤 找负责人</a>
                        <a class="tool-btn" href="https://hunter.io/search/${domain}" target="_blank" onclick="event.stopPropagation()">🔍 挖邮箱</a>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function selectLead(item, domain) {
            document.querySelectorAll('.lead-card').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const intelSpace = document.getElementById('intelSpace');
            const guestEmail = `info@${domain}`;

            intelSpace.innerHTML = `
                <button class="btn-save" id="saveBtn" onclick="saveToSheet('${item.title.replace(/'/g, "\\'")}', '${domain}', '${guestEmail}')">💾 一键录入线索库 (Google Sheet)</button>
                
                <div class="section-title">📊 客户背景分析</div>
                <div class="info-box">${item.snippet}</div>

                <div class="section-title">💡 邮箱投递建议 (高成功率)</div>
                <div class="info-box" style="background:#f0fdf4;">
                    <div class="email-item">● info@${domain}</div>
                    <div class="email-item">● purchasing@${domain}</div>
                    <div class="email-item">● sourcing@${domain}</div>
                </div>

                <div class="section-title">✉️ 刘总工厂版开发信:</div>
                <div class="mail-temp">
<span class="copy-tag" onclick="copyMail()">点击复制</span><span id="mailContent">Subject: Specialized Audio Solutions / R&D Support from Shenzhen Factory

Hi Purchasing Team,

I noticed ${item.title}'s professional presence in the audio market.

I am Liu, representing a dedicated R&D and manufacturing facility in Shenzhen. We specialize in high-performance speaker modules (waterproof/DSP solutions).

Unlike general traders, we offer direct factory R&D support to ensure quality and shorten your development cycle. 

Could we send over our 2026 product catalog for your reference?

Best regards,
Liu</span>
                </div>
            `;
        }

        async function saveToSheet(company, domain, email) {
            const btn = document.getElementById('saveBtn');
            btn.innerText = '⏳ 正在存入云端...';
            btn.disabled = true;

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ company, country: domain, email })
                });
                btn.innerText = '✅ 已成功同步至表格';
                btn.style.background = '#059669';
                setTimeout(() => {
                    btn.innerText = '💾 一键录入线索库 (Google Sheet)';
                    btn.style.background = '#10b981';
                    btn.disabled = false;
                }, 2000);
            } catch (e) { alert('同步失败'); btn.disabled = false; }
        }

        function copyMail() {
            const content = document.getElementById('mailContent').innerText;
            navigator.clipboard.writeText(content);
            alert('开发信已复制到剪贴板！');
        }
    </script>
</body>
</html>
