<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundLeads Agent - 喇叭外贸全网自动获客系统</title>
    <style>
        :root {
            --bg: #f5f6fa; --surface: #ffffff; --primary: #1a56db;
            --text: #1e293b; --text-secondary: #64748b; --border: #e2e8f0;
            --radius: 12px; --shadow: 0 1px 3px rgba(0,0,0,0.06);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;}
        .sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);position:fixed;height:100vh;padding:20px;}
        .main-content{margin-left:260px;flex:1;padding:20px;display:flex;flex-direction:column;gap:20px;}
        .config-card{background:var(--surface);padding:20px;border-radius:var(--radius);box-shadow:var(--shadow);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
        input, select{padding:10px 15px;border:1px solid var(--border);border-radius:8px;outline:none;}
        .btn{padding:10px 20px;border-radius:20px;cursor:pointer;border:none;font-weight:600;transition:0.2s;}
        .btn-primary{background:var(--primary);color:#fff;}
        .btn-sync{background:#10b981;color:#fff;margin-top:10px;width:100%;}
        .results-grid{display:grid;grid-template-columns: 1fr 400px; gap:20px; flex:1;}
        .panel{background:var(--surface);border-radius:var(--radius);padding:15px;border:1px solid var(--border);display:flex;flex-direction:column;}
        #resultsList{overflow-y:auto;flex:1;}
        .lead-card{padding:15px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;cursor:pointer;transition:0.2s;}
        .lead-card:hover{border-color:var(--primary);background:#f0f7ff;}
        .lead-card.active{border-color:var(--primary);background:#f0f7ff;box-shadow:inset 4px 0 0 var(--primary);}
        .lead-title{font-weight:700;color:var(--primary);margin-bottom:5px;display:block;text-decoration:none;}
        .lead-snippet{font-size:13px;color:var(--text-secondary);line-height:1.4;}
        #logWindow{background:#1e293b;color:#10b981;padding:12px;border-radius:8px;font-family:monospace;font-size:11px;height:120px;overflow-y:auto;display:none;}
        .loading-spinner { display:inline-block; width:14px; height:14px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite; vertical-align: middle; margin-right:8px;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .badge-source{font-size:10px;background:#e2e8f0;padding:2px 6px;border-radius:4px;margin-top:5px;display:inline-block;}
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2 style="margin-bottom:5px;">🔊 SoundLeads</h2>
        <p style="font-size:12px;color:var(--text-secondary);margin-bottom:25px;">刘总专供 · 喇叭模组获客版</p>
        <nav>
            <div style="background:#e8f0fe;color:var(--primary);font-weight:700;padding:10px;border-radius:8px;margin-bottom:10px;">🔍 谷歌全网搜索</div>
            <div style="padding:10px;color:var(--text-secondary);cursor:not-allowed;">📋 待同步管道</div>
        </nav>
        <div style="margin-top:auto;padding:10px;background:#fff8e1;border-radius:8px;font-size:11px;color:#b45309;">
            💡 提示：点击线索可提取信息并同步至谷歌表格
        </div>
    </aside>

    <main class="main-content">
        <div id="logWindow"></div>
        
        <div class="config-card">
            <strong>🎯 搜索词:</strong>
            <input type="text" id="keywords" value="Speaker Module Importer" style="flex:2;">
            <select id="countryTag">
                <option value="">全球范围</option>
                <option value="USA">美国</option>
                <option value="Germany">德国</option>
                <option value="Vietnam">越南</option>
            </select>
            <button class="btn btn-primary" id="searchBtn" onclick="runSmartSearch()">
                <span id="btnText">开始自动获客</span>
            </button>
        </div>

        <div class="results-grid">
            <div class="panel">
                <h4 style="margin-bottom:15px;">🆕 实时检索结果</h4>
                <div id="resultsList">
                    <div style="text-align:center;color:var(--text-secondary);padding-top:100px;">输入产品关键词，开启全网商机发现</div>
                </div>
            </div>
            <div class="panel" id="detailPanel">
                <h4 style="margin-bottom:15px;">📄 线索深度解析</h4>
                <div id="detailView" style="color:var(--text-secondary);font-size:14px;">请先从左侧选择一个潜在目标</div>
            </div>
        </div>
    </main>

    <script>
        // ======= 自动填入刘总的配置 =======
        const GOOGLE_API_KEY = 'AIzaSyBHKQQGYZJXjTBLjUchjSntVLw6_HB8jos'; 
        const GOOGLE_CX = 'c4271b0f647fa452e'; 
        // 👇 这里填入你昨天部署成功的那个 GAS 链接，用于把数据存入表格
        const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxE5ThwSihLFCw0XwYLgAITA3eDQAx_5t0DMz4K1eLcY3qSidz7evptbpvGFEtdPDd_9A/exec'; 

        function addLog(msg) {
            const log = document.getElementById('logWindow');
            log.style.display = 'block';
            log.innerHTML += `<div>> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        async function runSmartSearch() {
            const query = document.getElementById('keywords').value;
            const country = document.getElementById('countryTag').value;
            const btn = document.getElementById('searchBtn');
            const btnText = document.getElementById('btnText');
            
            btn.disabled = true;
            btnText.innerHTML = '<span class="loading-spinner"></span> 正在扫描全网...';
            addLog(`正在针对 "${query} ${country}" 调取谷歌全网实时数据...`);

            try {
                // 重点：在请求里通过指令优化结果，直接找 importer 和 distributor
                const fullQuery = `${query} ${country} "importer" OR "distributor" OR "wholesale"`;
                const searchUrl = `https://www.googleapis.com/customsearch/v1?key=${GOOGLE_API_KEY}&cx=${GOOGLE_CX}&q=${encodeURIComponent(fullQuery)}`;

                const response = await fetch(searchUrl);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    addLog(`找到 ${data.items.length} 个高潜力目标。`);
                    displayResults(data.items);
                } else {
                    addLog('未发现匹配结果。建议：尝试更具体的词，如 "High Fidelity Speaker Module Distribution"');
                    document.getElementById('resultsList').innerHTML = '<div style="padding:20px;">无匹配结果，请调整关键词。</div>';
                }
            } catch (error) {
                addLog('⚠️ API调用受限: ' + error.message);
                alert('搜索出错，可能是API额度耗尽或配置问题。');
            } finally {
                btn.disabled = false;
                btnText.innerHTML = '开始自动获客';
            }
        }

        function displayResults(items) {
            const list = document.getElementById('resultsList');
            list.innerHTML = '';
            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'lead-card';
                card.id = 'card-' + index;
                card.onclick = () => showDetail(item, index);
                card.innerHTML = `
                    <div class="lead-title">${item.title}</div>
                    <div class="lead-snippet">${item.snippet.substring(0, 120)}...</div>
                    <div class="badge-source">域名: ${item.displayLink}</div>
                `;
                list.appendChild(card);
            });
        }

        function showDetail(item, idx) {
            // 高亮当前选中的卡片
            document.querySelectorAll('.lead-card').forEach(c => c.classList.remove('active'));
            document.getElementById('card-'+idx).classList.add('active');

            const detail = document.getElementById('detailView');
            detail.innerHTML = `
                <div style="background:#f8fafc;padding:15px;border-radius:8px;border:1px solid #e2e8f0;">
                    <h3 style="color:var(--primary);font-size:16px;margin-bottom:10px;">${item.title}</h3>
                    <p style="margin-bottom:12px;"><strong>官方网址:</strong> <br><a href="${item.link}" target="_blank" style="color:var(--primary);word-break:break-all;">${item.link}</a></p>
                    
                    <div style="padding:10px;background:#fff;border-radius:5px;border:1px dashed #cbd5e1;font-size:13px;margin-bottom:15px;">
                        <strong>AI 获客建议:</strong><br>
                        该网站描述中提及了 "${item.snippet.substring(0,50)}"，初步判定为下游厂家或贸易商，建议立即跟进。
                    </div>

                    <button class="btn btn-sync" onclick="syncToSheet('${item.title}', '${item.link}', '${item.displayLink}')">
                        💾 同步到 Google 表格
                    </button>
                </div>
            `;
        }

        async function syncToSheet(name, url, domain) {
            if(GAS_WEBAPP_URL.includes('在此处')) {
                alert('刘总，您还没填入 Google Apps Script 的链接呢！数据现在只能看，存不了。');
                return;
            }

            addLog(`正在同步 [${name}] 至谷歌表格...`);
            
            try {
                const response = await fetch(GAS_WEBAPP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        company: name,
                        industry: '喇叭模组/电子',
                        country: '全网检索',
                        email: '需进一步挖掘',
                        website: url
                    }),
                    redirect: 'follow'
                });
                
                const res = await response.json();
                if(res.status === 'success') {
                    alert('✅ 同步成功！数据已入库。');
                    addLog('数据同步成功。');
                }
            } catch (err) {
                addLog('同步失败: ' + err.message);
                alert('同步出错，请检查后端脚本部署权限。');
            }
        }
    </script>
</body>
</html>
