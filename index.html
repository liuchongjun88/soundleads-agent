<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundLeads Agent</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 20px; background: #f5f6fa; color: #1e293b; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 16px; }
        input, select, button { padding: 10px 14px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #1a56db; color: #fff; cursor: pointer; border: none; }
        .results { margin-top: 20px; }
        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: #fff; padding: 12px 20px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔊 SoundLeads Agent</h1>
    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
        <input type="text" id="keywords" placeholder="英文关键词，如 speaker module manufacturer" value="speaker module manufacturer" style="flex:1;">
        <select id="industry">
            <option value="">所有行业</option>
            <option>智能家居</option><option>家用电器</option><option>汽车电子</option>
        </select>
        <select id="region">
            <option value="">所有地区</option>
            <option>Germany</option><option>USA</option><option>Japan</option>
        </select>
        <button id="searchBtn">🔍 全网扫描</button>
    </div>
    <div id="log" style="font-size: 12px; color: #666; margin-bottom: 10px;"></div>
    <div class="results" id="results"></div>
</div>
<div id="toast"></div>

<script>
    // 后端 Apps Script 地址（已部署，无 CORS 问题）
    const API_URL = 'https://script.google.com/macros/s/AKfycbxE5ThwSihLFCw0XwYLgAITA3eDQAx_5t0DMz4K1eLcY3qSidz7evptbpvGFEtdPDd_9A/exec';

    // 工具函数：显示简短提示
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(function() { t.style.display = 'none'; }, 3000);
    }

    // 搜索函数
    async function doSearch() {
        const keywords = document.getElementById('keywords').value.trim();
        if (!keywords) {
            showToast('请输入关键词');
            return;
        }
        const industry = document.getElementById('industry').value;
        const region = document.getElementById('region').value;
        
        const logDiv = document.getElementById('log');
        logDiv.textContent = '🔍 正在搜索...';
        document.getElementById('searchBtn').disabled = true;

        const params = new URLSearchParams({ keyword: keywords, industry: industry, region: region });
        try {
            const response = await fetch(API_URL + '?' + params.toString());
            const data = await response.json();
            if (data.success && data.leads && data.leads.length > 0) {
                showToast('✅ 找到 ' + data.leads.length + ' 条线索');
                renderResults(data.leads);
            } else {
                logDiv.textContent = '⚠️ 未找到结果，请尝试更简单的英文关键词';
                document.getElementById('results').innerHTML = '';
            }
        } catch (e) {
            logDiv.textContent = '❌ 请求失败：' + e.message;
            showToast('搜索失败，请重试');
        }
        document.getElementById('searchBtn').disabled = false;
    }

    // 渲染结果列表
    function renderResults(leads) {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = leads.map(function(lead) {
            return '<div class="card">' +
                '<strong>' + lead.company + '</strong> (' + lead.score + '分)<br>' +
                '🏭 ' + lead.industry + ' · 📍 ' + lead.country + '<br>' +
                '📋 ' + (lead.need || '').substring(0, 80) + '...</div>';
        }).join('');
        document.getElementById('log').textContent = '✅ 显示 ' + leads.length + ' 条结果';
    }

    // 绑定按钮点击事件
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('searchBtn').addEventListener('click', doSearch);
    });
</script>
</body>
</html>
