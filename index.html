<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundLeads 精准猎手版 - 喇叭模组客户深度挖掘</title>
    <style>
        /* 保留专业配色，增加操作逻辑 */
        :root { --primary: #1a73e8; --dark: #1e293b; --bg: #f8f9fa; --danger: #ef4444; }
        body { font-family: 'Segoe UI', system-ui; background: var(--bg); display: flex; height: 100vh; margin: 0; }
        .sidebar { width: 260px; background: var(--dark); color: #fff; padding: 25px 15px; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 顶部策略配置区 */
        .strategy-bar { background: #fff; padding: 20px 30px; border-bottom: 2px solid #e2e8f0; display: flex; gap: 15px; align-items: center; }
        .mode-select { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: bold; }
        input#q { flex: 1; padding: 12px 20px; border-radius: 30px; border: 1px solid #cbd5e1; outline: none; }
        .btn-hunt { background: var(--danger); color: #fff; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; }

        /* 线索展示区 */
        .content-area { flex: 1; display: grid; grid-template-columns: 1fr 450px; overflow: hidden; }
        #results-list { padding: 20px; overflow-y: auto; }
        .lead-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px; margin-bottom: 12px; cursor: pointer; }
        .lead-card:hover { border-color: var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .lead-card.is-contact { border-left: 5px solid #10b981; }

        /* 深度提取面板 */
        .detail-panel { background: #fff; border-left: 1px solid #e2e8f0; padding: 25px; overflow-y: auto; }
        .info-box { background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .label { font-size: 11px; color: #64748b; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .value { font-size: 14px; color: #1e293b; word-break: break-all; }
        
        .contact-hint { color: #059669; font-weight: bold; font-size: 12px; margin-top: 10px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>🎯 猎手模式</h3>
        <p style="font-size: 12px; color: #94a3b8; margin: 10px 0 30px;">避开大厂广告，直击采购负责人</p>
        <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; font-size: 13px;">
            <strong>小技巧：</strong><br>
            搜“联系人”时，系统会自动在关键词后加入 <i>"Purchasing Manager"</i> 等后缀。
        </div>
    </div>

    <div class="main">
        <div class="strategy-bar">
            <select id="searchMode" class="mode-select">
                <option value="factory">中小工厂/制造商</option>
                <option value="contact">找联系人/邮箱线索</option>
                <option value="b2b">找区域批发/贸易商</option>
            </select>
            <input type="text" id="q" placeholder="输入产品关键词，如: Speaker Module">
            <button class="btn-hunt" onclick="huntLeads()">精准捕获</button>
        </div>

        <div class="content-area">
            <div id="results-list">
                <div style="text-align:center; margin-top:100px; color:#94a3b8;">
                    请选择搜索模式并输入关键词
                </div>
            </div>

            <div class="detail-panel" id="detail-panel">
                <h4>线索深度情报</h4>
                <div id="detail-content" style="margin-top:20px; color:#64748b;">
                    选中左侧目标，提取联系方式...
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '13235c710dc8576425911811f046a2ab0e115639';

        async function huntLeads() {
            const baseQuery = document.getElementById('q').value;
            const mode = document.getElementById('searchMode').value;
            let finalQuery = "";

            // 核心逻辑：针对刘总需求调整搜索语法
            if (mode === 'factory') {
                // 排除大品牌，搜索中小型音频设备制造/组装厂
                finalQuery = `${baseQuery} -Sony -Bose -JBL "OEM/ODM" "speaker components" "manufacturer"`;
            } else if (mode === 'contact') {
                // 搜索包含采购经理、老板联系方式的页面
                finalQuery = `${baseQuery} "purchasing manager" OR "sourcing manager" OR "owner" "contact" email`;
            } else {
                // 搜索分销、批发商目录
                finalQuery = `${baseQuery} "distributor" OR "wholesaler" "apply for wholesale"`;
            }

            const list = document.getElementById('results-list');
            list.innerHTML = '正在绕过干扰，挖掘精准线索...';

            try {
                const response = await fetch('https://google.serper.dev/search', {
                    method: 'POST',
                    headers: { 'X-API-KEY': API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ q: finalQuery, num: 30 })
                });
                const data = await response.json();
                render(data.organic);
            } catch (e) {
                alert('连接异常');
            }
        }

        function render(items) {
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            items.forEach((item, i) => {
                // 检查描述中是否包含联系痕迹
                const hasContact = /email|contact|phone|@/i.test(item.snippet);
                const card = document.createElement('div');
                card.className = `lead-card ${hasContact ? 'is-contact' : ''}`;
                card.onclick = () => showDetail(item);
                card.innerHTML = `
                    <div class="lead-title" style="color: #1a73e8; font-weight:bold;">${item.title}</div>
                    <div style="font-size:12px; color:#059669; margin: 5px 0;">${item.link}</div>
                    <div style="font-size:13px; color:#475569;">${item.snippet}</div>
                    ${hasContact ? '<div class="contact-hint">📧 页面内检测到联系线索</div>' : ''}
                `;
                list.appendChild(card);
            });
        }

        function showDetail(item) {
            const panel = document.getElementById('detail-content');
            // 模拟深度提取逻辑
            const domain = new URL(item.link).hostname;
            
            panel.innerHTML = `
                <div class="info-box">
                    <div class="label">目标域名</div>
                    <div class="value">${domain}</div>
                </div>
                <div class="info-box">
                    <div class="label">网页快照提取</div>
                    <div class="value">${item.snippet}</div>
                </div>
                <div class="info-box" style="background:#e8f0fe; border: 1px solid #bfdbfe;">
                    <div class="label" style="color:#1e40af;">💡 开发行动建议</div>
                    <div class="value" style="color:#1e40af;">
                        1. 点击进入官网，搜索关键词: <b>"Purchasing"</b> 或 <b>"Sourcing"</b><br>
                        2. 在 LinkedIn 搜索: <b>"${domain} Procurement"</b><br>
                        3. 该页面提到 "${item.snippet.substring(0,20)}..."，这是切入点。
                    </div>
                </div>
                <button style="width:100%; padding:12px; background:#10b981; color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" 
                        onclick="window.open('${item.link}')">
                    立即进入官网挖掘联系方式
                </button>
            `;
        }
    </script>
</body>
</html>
