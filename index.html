<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundLeads Agent - 喇叭模组外贸自动获客系统</title>
    <style>
        :root {
            --bg: #f5f6fa; --surface: #ffffff; --surface2: #f8f9fc; --primary: #1a56db;
            --primary-light: #e8f0fe; --accent: #f59e0b; --success: #10b981;
            --danger: #ef4444; --text: #1e293b; --text-secondary: #64748b;
            --text-muted: #94a3b8; --border: #e2e8f0; --border-light: #f1f5f9;
            --shadow: 0 1px 3px rgba(0,0,0,0.06); --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
            --radius: 12px; --radius-lg: 16px; --transition: 0.2s ease;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;}
        .sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;box-shadow:var(--shadow);}
        .logo-icon{width:42px;height:42px;background:linear-gradient(135deg,#1a56db,#3b82f6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;}
        .sidebar-header{padding:20px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border-light);}
        .logo-text h3{font-size:15px;font-weight:700;}.logo-text span{font-size:11px;color:var(--text-muted);}
        .nav-item{display:flex;align-items:center;gap:11px;padding:12px 16px;margin:4px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text-secondary);border:none;background:none;width:calc(100% - 24px);text-align:left;transition:all var(--transition);}
        .nav-item:hover{background:var(--surface2);color:var(--text);}.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:600;}
        .main-content{margin-left:260px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
        .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow);}
        .btn{padding:9px 18px;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;display:flex;align-items:center;gap:6px;transition:all var(--transition);}
        .btn-primary{background:var(--primary);color:#fff;}.btn-outline{background:#fff;border-color:var(--border);color:var(--text);}
        .btn-sm{padding:6px 13px;font-size:12px;}.btn-xs{padding:3px 10px;font-size:11px;border-radius:14px;}
        .content-area{padding:20px 28px;flex:1;display:flex;flex-direction:column;gap:20px;overflow-y:auto;}
        .stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
        .stat-card{background:var(--surface);border-radius:var(--radius-lg);padding:16px;border:1px solid var(--border-light);box-shadow:var(--shadow);}
        .stat-value{font-size:28px;font-weight:800;}.stat-label{font-size:12px;color:var(--text-secondary);margin-top:4px;}
        .two-col{display:grid;grid-template-columns:1fr 460px;gap:16px;flex:1;min-height:0;}
        .panel{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border-light);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;}
        .panel-header{padding:16px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;font-weight:700;}
        .panel-body{flex:1;overflow-y:auto;padding:12px;}
        .agent-config{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px;}
        .agent-config input, .agent-config select{padding:10px 14px;border:1px solid var(--border);border-radius:30px;font-size:13px;outline:none;}
        .agent-config input:focus, .agent-config select:focus{border-color:var(--primary);}
        .progress-bar{height:4px;background:#e2e8f0;border-radius:2px;margin:8px 0;overflow:hidden;}
        .progress-fill{height:100%;background:var(--primary);border-radius:2px;width:0%;transition:width 0.3s;}
        .lead-card{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius);padding:12px 14px;cursor:pointer;margin-bottom:6px;transition:all var(--transition);}
        .lead-card:hover{border-color:#c4d5f0;box-shadow:var(--shadow);}.lead-card.selected{border-color:var(--primary);background:#fafcff;}
        .lead-top{display:flex;justify-content:space-between;align-items:center;}
        .company-name{font-weight:700;font-size:14px;}.lead-score{font-size:11px;padding:3px 9px;border-radius:14px;font-weight:700;}
        .score-hot{background:#fee2e2;color:#dc2626;}.score-warm{background:#fef3c7;color:#d97706;}.score-cool{background:#e8f0fe;color:#1a56db;}
        .detail-content{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
        .detail-section{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius);padding:14px;}
        .detail-section h5{font-size:11px;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-muted);margin-bottom:8px;}
        .detail-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #f8fafc;}
        .tag{font-size:10px;padding:3px 8px;border-radius:12px;background:#f1f5f9;color:#475569;}
        .badge{background:var(--accent);color:#fff;border-radius:12px;padding:2px 8px;font-size:10px;font-weight:700;}
        .hidden{display:none !important;}
        .toast{position:fixed;bottom:30px;right:30px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:30px;font-size:13px;z-index:300;animation:slideUp 0.3s ease;}
        @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
        @media(max-width:1200px){.two-col{grid-template-columns:1fr;}.stats-grid{grid-template-columns:repeat(3,1fr);}}
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header"><div class="logo-icon">🔊</div><div class="logo-text"><h3>SoundLeads Agent</h3><span>AI自动获客引擎</span></div></div>
        <nav style="flex:1;padding-top:8px;">
            <button class="nav-item active" data-view="agent"><span>🤖</span> AI Agent 搜索</button>
            <button class="nav-item" data-view="pipeline"><span>📋</span> 客户管道 <span class="badge" id="pipeCount">12</span></button>
            <button class="nav-item" data-view="dashboard"><span>📊</span> 仪表盘</button>
        </nav>
        <div style="padding:16px;border-top:1px solid var(--border-light);font-size:12px;color:var(--text-muted);">
            ⚡ 免费版 · 本地Agent引擎
        </div>
    </aside>

    <div class="main-content">
        <header class="topbar">
            <div style="display:flex;align-items:center;gap:16px;"><h2 id="viewTitle">🤖 AI Agent 自动搜索</h2></div>
            <div style="display:flex;gap:12px;">
                <button class="btn btn-outline btn-sm" onclick="switchView('pipeline')">📋 查看管道</button>
                <button class="btn btn-primary btn-sm" id="startAgentBtn">▶️ 启动自动搜索</button>
            </div>
        </header>

        <div class="content-area">
            <div id="view-agent" class="view-panel">
                <div class="agent-config" style="background:var(--surface);padding:16px;border-radius:var(--radius-lg);">
                    <span style="font-weight:600;">🎯 搜索配置</span>
                    <input type="text" id="keywordsInput" placeholder="产品关键词，如: 喇叭模组, DSP控制板" value="喇叭模组, 防水蜂鸣器, DSP音频控制板" style="flex:2;">
                    <select id="industrySelect" style="flex:1;">
                        <option>智能家居/智能音箱</option><option>家用电器</option><option>汽车电子</option>
                        <option>安防监控</option><option>医疗器械</option><option>消费电子</option>
                    </select>
                    <select id="regionSelect" style="flex:1;">
                        <option>美国</option><option>德国</option><option>日本</option><option>韩国</option><option>英国</option>
                    </select>
                    <button class="btn btn-primary btn-sm" onclick="startAgentSearch()">🔍 全网扫描</button>
                </div>
                <div id="agentLog" style="background:#1e293b;color:#e2e8f0;border-radius:var(--radius);padding:16px;font-family:monospace;font-size:12px;min-height:120px;display:none;margin-bottom:16px;">
                    <div id="logContent"></div>
                    <div class="progress-bar" style="margin-top:8px;"><div class="progress-fill" id="progressFill"></div></div>
                </div>
                <div class="two-col">
                    <div class="panel">
                        <div class="panel-header"><span>🆕 新发现线索 (<span id="foundCount">0</span>)</span></div>
                        <div class="panel-body" id="agentResultsContainer">
                            <div style="color:var(--text-muted);text-align:center;padding:40px;">点击“全网扫描”开始搜索</div>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-header"><span>📝 线索详情预览</span></div>
                        <div class="detail-panel" id="agentDetail">
                            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);">👈 点击左侧线索查看</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-pipeline" class="view-panel hidden">
                <div class="stats-grid" id="funnelStats"></div>
                <div style="margin-bottom:12px;"><span class="btn btn-outline btn-xs" style="cursor:pointer;" onclick="setFilter('all')">全部</span> <span class="btn btn-outline btn-xs" onclick="setFilter('new')">新线索</span> <span class="btn btn-outline btn-xs" onclick="setFilter('contacted')">已联系</span> <span class="btn btn-outline btn-xs" onclick="setFilter('quotation')">报价中</span> <span class="btn btn-outline btn-xs" onclick="setFilter('sample')">样品</span> <span class="btn btn-outline btn-xs" onclick="setFilter('negotiation')">谈判</span></div>
                <div class="two-col">
                    <div class="panel"><div class="panel-header"><span>客户列表 (<span id="leadCount">0</span>)</span></div><div class="panel-body" id="leadListContainer"></div></div>
                    <div class="panel"><div class="panel-header"><span>客户详情</span></div><div class="detail-content" id="detailContent"></div></div>
                </div>
            </div>

            <div id="view-dashboard" class="view-panel hidden"></div>
        </div>
    </div>
    <div id="toastContainer"></div>

    <script>
        // ==================== 极其重要的配置项 ====================
        // 👇 刘总，请把你昨天部署 Google Apps Script 得到的 URL 粘贴在下面单引号里
        const GAS_URL = '在此处粘贴你的_Google_Apps_Script_URL'; 
        // ==========================================================

        const leadsDB = [
            {id:1,company:'Sonos Inc.',industry:'智能家居/智能音箱',country:'美国',contact:'John Miller',score:92,status:'hot',stage:'quotation',estValue:'$850K',need:'高品质动圈喇叭模组',source:'Agent搜索',contacts:[{name:'John Miller',title:'采购总监',email:'j.miller@sonos.com'}],customs:[{hs:'8518.40',desc:'喇叭模组',date:'2026-03-15',val:'$185K'}],activities:[]},
            {id:2,company:'Bosch Home Appliances',industry:'家用电器',country:'德国',contact:'Anna Schmidt',score:88,status:'hot',stage:'contacted',estValue:'$620K',need:'防水蜂鸣器模组',source:'海关数据',contacts:[{name:'Anna Schmidt',title:'供应链经理',email:'a.schmidt@bosch-home.com'}],customs:[{hs:'8531.80',desc:'蜂鸣器',date:'2026-04-02',val:'$98K'}],activities:[]},
            {id:3,company:'Ring (Amazon)',industry:'智能家居/智能音箱',country:'美国',contact:'Mike Chen',score:95,status:'hot',stage:'sample',estValue:'$1.2M',need:'门铃喇叭模组+控制板',source:'Agent搜索',contacts:[{name:'Mike Chen',title:'硬件VP',email:'mike.chen@ring.com'}],customs:[{hs:'8518.40',desc:'门铃模组',date:'2026-04-10',val:'$275K'}],activities:[]},
            {id:5,company:'Tesla Inc.',industry:'汽车电子',country:'美国',contact:'Elon Reeve',score:91,status:'hot',stage:'negotiation',estValue:'$3.5M',need:'AVAS喇叭模组',source:'行业展会',contacts:[{name:'Elon Reeve',title:'供应链总监',email:'ereeve@tesla.com'}],customs:[],activities:[]}
        ];

        let agentFoundLeads = [];
        let currentView = 'agent';

        // ==================== 发送数据到谷歌表格的魔法函数 ====================
        function saveLeadToBackend(leadData) {
            if(GAS_URL === 'https://script.google.com/macros/s/AKfycbxE5ThwSihLFCw0XwYLgAITA3eDQAx_5t0DMz4K1eLcY3qSidz7evptbpvGFEtdPDd_9A/exec') {
                showToast('⚠️ 提示: 请在代码里填入真实的 GAS URL，目前仅保存在本地');
                return;
            }

            fetch(GAS_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8', 
                },
                body: JSON.stringify(leadData),
                redirect: 'follow' 
            })
            .then(response => response.json())
            .then(result => {
                if(result.status === 'success') {
                    showToast('☁️ 成功：线索已安全同步至云端谷歌表格！');
                } else {
                    showToast('❌ 同步失败: ' + result.message);
                }
            })
            .catch(error => {
                console.error('API Error:', error);
                showToast('❌ 网络错误，未能连接到谷歌表格');
            });
        }

        function switchView(view){
            currentView = view;
            document.querySelectorAll('.view-panel').forEach(v=>v.classList.add('hidden'));
            document.getElementById('view-'+view)?.classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            document.querySelector(`[data-view="${view}"]`)?.classList.add('active');
            document.getElementById('viewTitle').textContent = {agent:'🤖 AI Agent 自动搜索',pipeline:'📋 客户开发管道',dashboard:'📊 销售仪表盘'}[view]||view;
            if(view==='pipeline'){ renderFunnelStats(); renderPipelineLeads(); }
            if(view==='dashboard') renderDashboard();
        }

        function startAgentSearch(){
            const keywords = document.getElementById('keywordsInput').value;
            const industry = document.getElementById('industrySelect').value;
            const region = document.getElementById('regionSelect').value;
            if(!keywords) return showToast('请输入产品关键词');

            const logDiv = document.getElementById('agentLog');
            const logContent = document.getElementById('logContent');
            const progressFill = document.getElementById('progressFill');
            logDiv.style.display = 'block';
            logContent.innerHTML = '';
            progressFill.style.width = '0%';

            const steps = [
                `🔍 启动Agent... 产品: ${keywords} | 行业: ${industry} | 地区: ${region}`,
                `📡 正在查询海关数据库 (HS 8518, 8531)...`,
                `🌐 正在抓取Google商业列表...`,
                `🔗 扫描LinkedIn公司主页...`,
                `📊 分析近期进口记录...`,
                `✅ 搜索完成！发现潜在客户。`
            ];
            let i = 0;
            const interval = setInterval(()=>{
                if(i < steps.length){
                    logContent.innerHTML += `<div style="margin:4px 0;">${steps[i]}</div>`;
                    progressFill.style.width = `${(i+1)/steps.length*100}%`;
                    i++;
                } else {
                    clearInterval(interval);
                    generateAgentResults(keywords, industry, region);
                    document.getElementById('startAgentBtn').disabled = false;
                }
            }, 800);
            document.getElementById('startAgentBtn').disabled = true;
        }

        function generateAgentResults(keywords, industry, region){
            const sampleLeads = [
                {company:'Harman International', industry:'汽车电子', country:'美国', need:'车规级喇叭模组', score:90, contact:'Robert Kim', title:'全球采购', email:'r.kim@harman.com', source:'海关数据', customs:[{hs:'8518.29',desc:'车用喇叭',date:'2026-04-15',val:'$320K'}]},
                {company:'Logitech Inc.', industry:'消费电子', country:'美国', need:'薄型平板喇叭', score:82, contact:'Sophie Martin', title:'供应链经理', email:'sophie.m@logitech.com', source:'Google搜索', customs:[{hs:'8518.29',desc:'喇叭单元',date:'2026-04-20',val:'$180K'}]},
                {company:'VTech Holdings', industry:'消费电子', country:'中国香港', need:'儿童教育玩具喇叭模组', score:78, contact:'Leung Chi-wai', title:'采购总监', email:'cw.leung@vtech.com', source:'LinkedIn', customs:[]},
                {company:'ABB Ltd.', industry:'工业设备', country:'瑞士', need:'工业警报蜂鸣器', score:75, contact:'Anders Johansson', title:'品类经理', email:'anders.j@abb.com', source:'展会名录', customs:[{hs:'8531.80',desc:'警报装置',date:'2026-03-28',val:'$95K'}]},
            ];
            agentFoundLeads = sampleLeads.map((l,idx)=>({...l, id: Date.now()+idx, status:'hot', stage:'new', estValue:l.customs?.length?`$${Math.floor(Math.random()*500)+200}K`:'待评估'}));
            renderAgentResults();
            showToast(`✅ Agent 搜索完成！发现 ${agentFoundLeads.length} 条新线索`);
        }

        function renderAgentResults(){
            const container = document.getElementById('agentResultsContainer');
            document.getElementById('foundCount').textContent = agentFoundLeads.length;
            container.innerHTML = agentFoundLeads.map(l=>`
                <div class="lead-card" onclick="selectAgentLead(${l.id})" id="agentCard${l.id}">
                    <div class="lead-top"><span class="company-name">${l.company}</span><span class="lead-score score-hot">${l.score}分</span></div>
                    <div style="font-size:11px;color:var(--text-secondary);">📍 ${l.country} · 🏭 ${l.industry}</div>
                    <div style="font-size:11px;">需求: ${l.need}</div>
                    <div><span class="tag">来源: ${l.source}</span></div>
                </div>`).join('');
        }

        function selectAgentLead(id){
            const lead = agentFoundLeads.find(l=>l.id===id); if(!lead) return;
            document.querySelectorAll('.lead-card').forEach(c=>c.classList.remove('selected'));
            document.getElementById('agentCard'+id)?.classList.add('selected');
            const detail = document.getElementById('agentDetail');
            detail.innerHTML = `
                <div class="detail-content">
                    <h4>${lead.company}</h4>
                    <div class="detail-section"><h5>基本信息</h5>
                        <div class="detail-row"><span>行业</span><span>${lead.industry}</span></div>
                        <div class="detail-row"><span>国家</span><span>${lead.country}</span></div>
                        <div class="detail-row"><span>需求产品</span><span>${lead.need}</span></div>
                        <div class="detail-row"><span>数据来源</span><span>${lead.source}</span></div>
                    </div>
                    ${lead.contact ? `<div class="detail-section"><h5>联系人</h5><div>${lead.contact} · ${lead.title}<br>📧 ${lead.email}</div></div>` : ''}
                    ${lead.customs?.length ? `<div class="detail-section"><h5>海关记录</h5>${lead.customs.map(c=>`<div style="font-size:11px;">${c.date} ${c.desc} ${c.val}</div>`).join('')}</div>` : ''}
                    <button class="btn btn-primary btn-sm" onclick="addToPipeline(${id})">➕ 添加到客户管道</button>
                </div>`;
        }

        // ==================== 点击添加到管道时的触发逻辑 ====================
        function addToPipeline(id){
            const lead = agentFoundLeads.find(l=>l.id===id);
            if(!lead) return;
            
            if(leadsDB.some(l=>l.company===lead.company)) return showToast('该客户已在管道中');
            
            // 1. 本地网页显示更新
            leadsDB.push({
                id: Date.now(), company:lead.company, industry:lead.industry, country:lead.country,
                contact:lead.contact, title:lead.title, score:lead.score, status:lead.score>=80?'hot':'warm',
                stage:'new', estValue:lead.estValue, need:lead.need, source:lead.source,
                contacts:lead.contact?[{name:lead.contact,title:lead.title,email:lead.email}]:[],
                customs:lead.customs||[], activities:[], nextFollowUp:''
            });
            showToast(`✅ ${lead.company} 已加入管道，正在同步至云端...`);
            if(currentView==='pipeline'){ renderFunnelStats(); renderPipelineLeads(); }

            // 2. 触发后台云端同步
            saveLeadToBackend({
                company: lead.company,
                industry: lead.industry,
                country: lead.country,
                email: lead.email || '无记录'
            });
        }

        function renderFunnelStats(){
            const stages = ['new','contacted','quotation','sample','negotiation','won'];
            const names = {new:'新线索',contacted:'已联系',quotation:'报价中',sample:'样品',negotiation:'谈判',won:'成交'};
            document.getElementById('funnelStats').innerHTML = stages.map(s=>{
                const count = leadsDB.filter(l=>l.stage===s).length;
                return `<div class="stat-card"><div class="stat-value">${count}</div><div class="stat-label">${names[s]}</div></div>`;
            }).join('');
            document.getElementById('pipeCount').textContent = leadsDB.length;
        }

        function renderPipelineLeads(filter='all'){
            let filtered = [...leadsDB];
            if(filter!=='all') filtered = filtered.filter(l=>l.stage===filter);
            document.getElementById('leadCount').textContent = filtered.length;
            const container = document.getElementById('leadListContainer');
            container.innerHTML = filtered.map(l=>`
                <div class="lead-card" onclick="selectPipelineLead(${l.id})">
                    <div class="lead-top"><span class="company-name">${l.company}</span><span class="lead-score ${l.score>=80?'score-hot':l.score>=50?'score-warm':'score-cool'}">${l.score}分</span></div>
                    <div style="font-size:11px;">${l.industry} · ${l.country} · ${l.estValue}</div>
                    <div><span class="tag">${l.stage}</span></div>
                </div>`).join('');
        }

        function selectPipelineLead(id){
            const lead = leadsDB.find(l=>l.id===id); if(!lead) return;
            const detail = document.getElementById('detailContent');
            detail.innerHTML = `
                <h4>${lead.company}</h4>
                <div class="detail-section"><h5>联系人</h5>${lead.contacts?.map(c=>`<div>${c.name} · ${c.title}<br>📧 ${c.email}</div>`).join('')||'无'}</div>
                <div class="detail-section"><h5>海关数据</h5>${lead.customs?.map(c=>`<div style="font-size:11px;">${c.date} ${c.desc} ${c.val}</div>`).join('')||'无'}</div>
                <button class="btn btn-primary btn-sm" onclick="showToast('开发信已发送至 ${lead.contacts?.[0]?.email}')">📧 发送开发信</button>
            `;
        }

        function setFilter(f){ renderPipelineLeads(f); }

        function renderDashboard(){
            document.getElementById('view-dashboard').innerHTML = `
                <div class="stats-grid"><div class="stat-card"><div class="stat-value">${leadsDB.length}</div><div class="stat-label">管道总客户</div></div>
                <div class="stat-card"><div class="stat-value">${agentFoundLeads.length}</div><div class="stat-label">本次新发现</div></div></div>`;
        }

        function showToast(msg){
            const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(()=>{t.remove();},2500);
        }

        // 初始化
        document.querySelectorAll('.nav-item').forEach(el=>el.addEventListener('click', ()=>switchView(el.dataset.view)));
        switchView('agent');
        renderAgentResults();
    </script>
</body>
</html>
