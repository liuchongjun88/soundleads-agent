<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundLeads Agent - 喇叭模组客户开发</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 20px; background: #f5f6fa; color: #1e293b; }
        .container { max-width: 900px; margin: 0 auto; }
        input, select, button, textarea { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #1a56db; color: #fff; cursor: pointer; border: none; }
        .btn-live { background: #10b981; } .btn-db { background: #f59e0b; } .btn-import { background: #7c3aed; }
        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin: 8px 0; cursor: pointer; }
        .card:hover { border-color: #1a56db; }
        .detail { background: #f8f9fc; padding: 16px; border-radius: 8px; margin-top: 16px; }
        #toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: #fff; padding: 12px 20px; border-radius: 8px; display: none; }
        .section { margin: 16px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔊 SoundLeads Agent</h1>
    <p>实时搜索全球喇叭制造商 | 内置核心客户库 | 手动导入客户</p>
    <div class="section">
        <input type="text" id="keywords" placeholder="实时搜索，如 speaker manufacturer Germany" value="speaker manufacturer" style="width:70%;">
        <button id="liveSearchBtn" class="btn-live">🌐 实时搜索</button>
        <button id="showDbBtn" class="btn-db">📋 内置数据库</button>
    </div>
    <div class="section">
        <details>
            <summary style="cursor:pointer; font-weight:bold;">📥 手动导入客户 (JSON格式)</summary>
            <textarea id="importArea" rows="4" placeholder='[{"company":"公司名","industry":"行业","country":"国家","need":"需求","url":"网址"}]' style="width:100%;"></textarea>
            <button id="importBtn" class="btn-import">导入到当前列表</button>
        </details>
    </div>
    <div id="log" style="font-size:12px;color:#666;margin:8px 0;"></div>
    <div id="results"></div>
</div>
<div id="toast"></div>

<script>
    // 内置数据库
    var supplierDB = [
        {company:"Visaton GmbH & Co. KG",industry:"喇叭单元制造",country:"德国",need:"全频及高音喇叭单元",url:"https://www.visaton.de"},
        {company:"Tymphany (Peerless)",industry:"电声器件制造",country:"美国/丹麦",need:"高保真音响喇叭单元",url:"https://www.tymphany.com"},
        {company:"B&C Speakers",industry:"专业扬声器制造",country:"意大利",need:"高功率压缩驱动器",url:"https://www.bcspeakers.com"},
        {company:"Celestion",industry:"乐器及专业喇叭制造",country:"英国",need:"吉他扬声器及专业驱动头",url:"https://celestion.com"},
        {company:"Eminence Speaker",industry:"乐器及音响喇叭制造",country:"美国",need:"吉他贝斯扬声器",url:"https://www.eminence.com"},
        {company:"SEAS Fabrikker",industry:"高级扬声器单元制造",country:"挪威",need:"精密高音及中低音单元",url:"https://www.seas.no"}
    ];
    // 当前显示的数据集（可以混合内置和导入的）
    var currentLeads = supplierDB.slice();

    var API_URL = 'https://script.google.com/macros/s/AKfycbxE5ThwSihLFCw0XwYLgAITA3eDQAx_5t0DMz4K1eLcY3qSidz7evptbpvGFEtdPDd_9A/exec';

    function showToast(msg) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(function() { t.style.display = 'none'; }, 3000);
    }

    function renderCards(companies) {
        var resultsDiv = document.getElementById('results');
        if (!companies || companies.length === 0) {
            resultsDiv.innerHTML = '<p>暂无客户数据。</p>';
            return;
        }
        var html = '';
        companies.forEach(function(c) {
            html += '<div class="card" onclick="showDetail(this)" data-company="' + c.company + '" data-industry="' + c.industry + '" data-country="' + c.country + '" data-need="' + c.need + '" data-url="' + (c.url||'') + '">' +
                '<strong>' + c.company + '</strong> (' + (c.score||'') + '分)<br>' +
                '🏭 ' + c.industry + ' · 📍 ' + c.country + '<br>' +
                '📋 ' + c.need + '</div>';
        });
        resultsDiv.innerHTML = html;
    }

    function showDetail(card) {
        var company = card.dataset.company;
        var industry = card.dataset.industry;
        var country = card.dataset.country;
        var need = card.dataset.need;
        var url = card.dataset.url;
        var detailHtml = '<div class="detail"><h2>' + company + '</h2>' +
            '<p><strong>行业：</strong>' + industry + '<br>' +
            '<strong>国家：</strong>' + country + '<br>' +
            '<strong>需求产品：</strong>' + need + '<br>' +
            (url ? '<strong>网站：</strong><a href="' + url + '" target="_blank">' + url + '</a>' : '') + '</p>' +
            '<button onclick="showToast(\'开发信已发送至测试邮箱\')">📧 发送开发信</button> ' +
            '<button onclick="backToList()">返回列表</button></div>';
        document.getElementById('results').innerHTML = detailHtml;
    }

    function backToList() { renderCards(currentLeads); }

    function showDatabase() {
        currentLeads = supplierDB.slice();
        renderCards(currentLeads);
        document.getElementById('log').textContent = '显示了内置数据库 ' + currentLeads.length + ' 家制造商';
    }

    function liveSearch() {
        var keywords = document.getElementById('keywords').value.trim();
        if (!keywords) { showToast('请输入搜索关键词'); return; }
        var logDiv = document.getElementById('log');
        logDiv.textContent = '🌐 正在实时搜索...';
        document.getElementById('liveSearchBtn').disabled = true;

        fetch(API_URL + '?keyword=' + encodeURIComponent(keywords))
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success && data.leads && data.leads.length > 0) {
                    currentLeads = data.leads;
                    showToast('✅ 实时搜索找到 ' + data.leads.length + ' 条结果');
                    renderCards(currentLeads);
                    logDiv.textContent = '✅ 实时搜索完成，共 ' + data.leads.length + ' 条结果';
                } else {
                    logDiv.textContent = '⚠️ 实时搜索无结果，请尝试其他关键词';
                    document.getElementById('results').innerHTML = '<p>未找到结果，请尝试更通用的英文关键词（如 speaker module）</p>';
                }
            })
            .catch(function(e) {
                logDiv.textContent = '❌ 请求失败：' + e.message;
                showToast('网络错误');
            })
            .finally(function() {
                document.getElementById('liveSearchBtn').disabled = false;
            });
    }

    function importCustomers() {
        var text = document.getElementById('importArea').value.trim();
        if (!text) { showToast('请粘贴 JSON 格式客户数据'); return; }
        try {
            var imported = JSON.parse(text);
            if (!Array.isArray(imported)) throw new Error('必须是数组');
            // 合并到当前列表
            currentLeads = currentLeads.concat(imported);
            renderCards(currentLeads);
            document.getElementById('importArea').value = '';
            showToast('✅ 成功导入 ' + imported.length + ' 个客户');
            document.getElementById('log').textContent = '当前共有 ' + currentLeads.length + ' 个客户';
        } catch(e) {
            showToast('JSON 格式错误，请检查');
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('showDbBtn').addEventListener('click', showDatabase);
        document.getElementById('liveSearchBtn').addEventListener('click', liveSearch);
        document.getElementById('importBtn').addEventListener('click', importCustomers);
        // 默认显示内置数据库
        showDatabase();
    });
</script>
</body>
</html>
