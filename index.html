<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundLeads 最终修复版 - 喇叭外贸深度获客</title>
    <style>
        :root { --primary: #1a73e8; --dark: #1e293b; --bg: #f8fafc; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--dark); color: #fff; padding: 25px 20px; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .search-bar { background: #fff; padding: 20px 30px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #cbd5e1; outline: none; }
        button { background: var(--primary); color: #fff; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .content { flex: 1; display: grid; grid-template-columns: 1fr 400px; overflow: hidden; }
        #results { padding: 20px; overflow-y: auto; }
        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .title { color: var(--primary); font-size: 17px; font-weight: bold; text-decoration: none; display: block; margin-bottom: 8px; }
        .snippet { font-size: 14px; color: #475569; line-height: 1.5; }
        .tools { display: flex; gap: 8px; margin-top: 12px; }
        .tool-link { font-size: 11px; color: #64748b; background: #f1f5f9; padding: 5px 10px; border-radius: 4px; text-decoration: none; border: 1px solid #e2e8f0; }
        #loader { display: none; text-align: center; padding: 40px; color: var(--primary); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:var(--primary)">🎯 SoundLeads</h2>
        <p style="font-size:12px; color:#94a3b8; margin-top:10px;">修复 400 错误专用版</p>
        <div style="margin-top:30px; font-size:13px; background:rgba(255,255,255,0.05); padding:15px; border-radius:8px;">
            <b>刘总提示：</b><br>如果仍报错，请确认您的 Serper 后台显示有免费点数。
        </div>
    </div>

    <div class="main">
        <div class="search-bar">
            <input type="text" id="q" placeholder="输入产品关键词，如: Speaker Module Importer">
            <button onclick="safeHunt()">开始搜索</button>
        </div>

        <div id="loader">🚀 正在全球范围检索精准商机...</div>

        <div class="content">
            <div id="results">
                <div style="text-align:center; margin-top:100px; color:#94a3b8;">请输入关键词并回车</div>
            </div>
            <div style="background:#fff; border-left:1px solid #e2e8f0; padding:25px;">
                <h4>开发工具栏</h4>
                <p style="font-size:13px; color:#64748b; margin-top:10px;">点击左侧结果，在此处获取深度开发建议。</p>
            </div>
        </div>
    </div>

    <script>
        const KEY = '13235c710dc8576425911811f046a2ab0e115639';

        async function safeHunt() {
            const val = document.getElementById('q').value;
            if(!val) return;

            const resDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            
            resDiv.innerHTML = '';
            loader.style.display = 'block';

            // 防错处理：只保留最纯粹的请求体，彻底杜绝 400 报错
            const rawBody = {
                "q": val + " manufacturer importer -JBL -Sony"
            };

            try {
                const response = await fetch('https://google.serper.dev/search', {
                    method: 'POST',
                    headers: {
                        'X-API-KEY': KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(rawBody)
                });

                if (!response.ok) {
                    const err = await response.text();
                    throw new Error(err);
                }

                const data = await response.json();
                render(data.organic || []);
            } catch (e) {
                resDiv.innerHTML = `<div style="color:red; padding:20px;">
                    ❌ 连接受阻：${e.message}<br><br>
                    <b>刘总，请检查：</b><br>
                    1. 您的 API Key 是否在 Serper 官网后台依然显示 Active？<br>
                    2. 如果您开启了 VPN，请尝试切换节点或关闭再试。
                </div>`;
            } finally {
                loader.style.display = 'none';
            }
        }

        function render(items) {
            const resDiv = document.getElementById('results');
            if(items.length === 0) {
                resDiv.innerHTML = '未搜索到结果，请简化词语。';
                return;
            }
            items.forEach(item => {
                const domain = new URL(item.link).hostname.replace('www.', '');
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <a class="title" href="${item.link}" target="_blank">${item.title}</a>
                    <div style="color:var(--success); font-size:12px; margin-bottom:8px;">${item.link}</div>
                    <div class="snippet">${item.snippet}</div>
                    <div class="tools">
                        <a class="tool-link" href="https://www.linkedin.com/search/results/people/?keywords=${domain}%20purchasing" target="_blank">👤 搜采购经理</a>
                        <a class="tool-link" href="https://www.google.com/search?q=site:${domain}+email" target="_blank">📧 挖掘邮箱</a>
                    </div>
                `;
                resDiv.appendChild(div);
            });
        }
    </script>
</body>
</html>
