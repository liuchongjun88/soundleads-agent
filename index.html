<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SoundLeads Pro - 刘总满血合体版</title>
    <style>
        :root { --primary: #1a73e8; --dark: #1e293b; --success: #10b981; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: var(--dark); color: #fff; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-size: 20px; font-weight: bold; color: #60a5fa; margin-bottom: 20px; }
        .nav-info { font-size: 12px; color: #94a3b8; line-height: 1.8; border-top: 1px solid #334155; padding-top: 15px; }

        .main { flex: 1; display: flex; flex-direction: column; }
        .top-bar { background: #fff; padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; padding: 10px 20px; border-radius: 20px; border: 1px solid var(--border); outline: none; }
        .btn-search { background: var(--primary); color: #fff; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .content { flex: 1; display: grid; grid-template-columns: 1fr 450px; overflow: hidden; }
        #results-list { padding: 20px; overflow-y: auto; background: #f1f5f9; }
        .lead-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; cursor: pointer; }
        .lead-card.active { border-left: 6px solid var(--primary); background: #f0f7ff; }
        .card-title { color: var(--primary); font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        
        .tool-bar { display: flex; gap: 8px; margin-top: 10px; }
        .tool-btn { font-size: 11px; padding: 4px 10px; border-radius: 4px; text-decoration: none; border: 1px solid #cbd5e1; background: #fff; color: #64748b; }

        .detail-panel { background: #fff; border-left: 1px solid var(--border); padding: 20px; overflow-y: auto; }
        .btn-save { width: 100%; background: var(--success); color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; font-size: 15px; }
        
        .section-title { font-size: 14px; font-weight: bold; margin: 15px 0 8px; }
        .info-box { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 13px; line-height: 1.5; }
        .mail-temp { background: #f1f5f9; padding: 15px; font-size: 12px; white-space: pre-wrap; position: relative; border-radius: 8px; }
        #loader { display: none; text-align: center; padding: 15px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🎯 SoundLeads Pro</div>
        <div class="nav-info">已连接至刘总 A1 客户库</div>
    </div>
    <div class="main">
        <div class="top-bar">
            <input type="text" id="searchInput" placeholder="搜索全球分销商...">
            <button class="btn-search" onclick="executeSearch()">全网扫描</button>
        </div>
        <div id="loader">🚀 正在挖掘情报...</div>
        <div class="content">
            <div id="results-list"></div>
            <div class="detail-panel" id="intelSpace"></div>
        </div>
    </div>

    <script>
        const SERPER_KEY = '13235c710dc8576425911811f046a2ab0e115639';
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxE5ThwSihLFCw0XwYLgAITA3eDQAx_5t0DMz4K1eLcY3qSidz7evptbpvGFEtdPDd_9A/exec';

        async function executeSearch() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            document.getElementById('loader').style.display = 'block';
            try {
                const res = await fetch('https://google.serper.dev/search', {
                    method: 'POST',
                    headers: { 'X-API-KEY': SERPER_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ q: query, num: 15 })
                });
                const data = await res.json();
                renderResults(data.organic || []);
            } catch (e) { alert("网络异常"); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function renderResults(items) {
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            items.forEach(item => {
                const domain = new URL(item.link).hostname.replace('www.', '');
                const card = document.createElement('div');
                card.className = 'lead-card';
                card.onclick = () => selectLead(item, domain);
                card.innerHTML = `
                    <div class="card-title">${item.title}</div>
                    <div class="tool-bar">
                        <a class="tool-btn" href="https://www.importyeti.com/search?q=${domain}" target="_blank">🚢 海关</a>
                        <a class="tool-btn" href="https://www.linkedin.com/search/results/people/?keywords=${domain}" target="_blank">👤 找人</a>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function selectLead(item, domain) {
            document.querySelectorAll('.lead-card').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
            const email = `info@${domain}`;
            document.getElementById('intelSpace').innerHTML = `
                <button class="btn-save" id="saveBtn" onclick="saveToSheet('${item.title.replace(/'/g, "\\'")}', '${domain}', '${email}', '${item.snippet.replace(/'/g, "\\'")}')">💾 一键录入 A1 库</button>
                <div class="section-title">📊 摘要分析</div>
                <div class="info-box">${item.snippet}</div>
                <div class="section-title">✉️ 建议开发信</div>
                <div class="mail-temp">Hi Team, I'm Liu from Shenzhen factory. We provide R&D support for your audio projects...</div>
            `;
        }

        async function saveToSheet(company, domain, email, snippet) {
            const btn = document.getElementById('saveBtn');
            btn.innerText = '⏳ 正在录入...';
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ company, country: domain, email, snippet, customs: 'https://www.importyeti.com/search?q='+domain })
                });
                btn.innerText = '✅ 录入成功';
                btn.style.background = '#059669';
            } catch (e) { alert("同步失败"); }
        }
    </script>
</body>
</html>
